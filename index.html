<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIDEON</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #gideon-ui {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      display: flex; gap: 12px;
      background: rgba(0, 0, 0, 0.75);
      padding: 8px 12px; border-radius: 4px;
      font-family: monospace; font-size: 13px; color: #0f8;
    }
    #gideon-ui label { display: flex; align-items: center; gap: 6px; }
    #gideon-ui select {
      background: #111; color: #0f8; border: 1px solid #0f8;
      font-family: monospace; font-size: 13px;
      padding: 2px 4px; border-radius: 2px;
    }
  </style>
</head>
<body>
  <canvas id="gideon-canvas"></canvas>
  <div id="gideon-ui">
    <label>Mode
      <select id="ui-mode">
        <option value="ascii" selected>ASCII</option>
        <option value="raw">Raw Webcam</option>
      </select>
    </label>
    <label>Charset
      <select id="ui-charset">
        <option value="minimal" selected>Minimal</option>
        <option value="standard">Standard</option>
        <option value="dense">Dense</option>
      </select>
    </label>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
